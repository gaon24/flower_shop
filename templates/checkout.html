{% extends "base.html" %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<h1 class="page-title">📝 Оформление заказа</h1>

<div class="checkout-grid">
    <div class="order-summary">
        <h2>Ваш заказ</h2>
        {% for item in cart_items %}
        <div class="order-item">
            <span>{{ item.name }} x {{ item.quantity }}</span>
            <span>{{ item.subtotal }} ₽</span>
        </div>
        {% endfor %}
        <div class="order-total">
            <strong>Итого: {{ total }} ₽</strong>
        </div>
    </div>
    
    <div class="checkout-form">
        <h2>Контактные данные</h2>
        <form action="/place_order" method="POST">
            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" name="name" required placeholder="Иван Иванов">
            </div>
            
            <div class="form-group">
                <label>Телефон:</label>
                <input type="tel" name="phone" required placeholder="+7 (999) 123-45-67">
            </div>
            
            <div class="form-group">
                <label>Адрес доставки:</label>
                <textarea name="address" required placeholder="г. Москва, ул. Цветочная, д. 1, кв. 1" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label>Способ оплаты:</label>
                <select name="payment">
                    <option value="card">Банковская карта</option>
                    <option value="cash">Наличными при получении</option>
                </select>
            </div>
            
            <button type="submit" class="submit-order-btn">✅ Подтвердить заказ</button>
        </form>
    </div>
</div>
{% endblock %}
